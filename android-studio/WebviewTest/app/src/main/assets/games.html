<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二年级学习乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f8ff; padding: 20px; color: #333; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #ff6b6b; margin-bottom: 20px; font-size: 28px; text-shadow: 2px 2px 0px #fff; }
        
        /* 顶部导航 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 15px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .score-display { font-size: 18px; font-weight: bold; color: #ffa502; display: flex; align-items: center; gap: 5px; }
        .nav-btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.2s; font-weight: bold; }
        .btn-home { background: #7bed9f; color: #fff; }
        .btn-wrong { background: #ff4757; color: #fff; position: relative; }
        .nav-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* 页面容器 */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 菜单网格 */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .menu-card { background: #fff; padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 2px solid transparent; }
        .menu-card:hover { transform: translateY(-5px); border-color: #7bed9f; box-shadow: 0 8px 25px rgba(123, 237, 159, 0.2); }
        .menu-card h2 { color: #2ed573; margin-bottom: 10px; font-size: 22px; }
        .menu-card p { color: #888; font-size: 14px; }

        /* 测试区域 - 填空题 */
        .game-area { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .question-box { font-size: 24px; margin-bottom: 30px; text-align: center; padding: 30px; background: #f8f9fa; border-radius: 15px; font-weight: bold; color: #2f3542; line-height: 1.5; }
        
        .input-area { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .answer-input { padding: 12px 20px; font-size: 20px; border: 2px solid #dfe4ea; border-radius: 12px; outline: none; width: 200px; text-align: center; transition: 0.3s; }
        .answer-input:focus { border-color: #7bed9f; box-shadow: 0 0 0 3px rgba(123, 237, 159, 0.2); }
        .submit-btn { padding: 12px 30px; background: #1e90ff; color: #fff; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .submit-btn:hover { background: #0077cc; transform: translateY(-2px); }
        
        .feedback { text-align: center; height: 30px; font-weight: bold; margin-bottom: 10px; font-size: 18px; }
        .feedback.correct { color: #2ed573; }
        .feedback.wrong { color: #ff4757; }

        .timer-bar { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .timer-fill { height: 100%; background: linear-gradient(90deg, #7bed9f, #2ed573); width: 100%; transition: width 1s linear; }

        /* 错题库样式 */
        .wrong-list { list-style: none; max-height: 500px; overflow-y: auto; }
        .wrong-item { background: #fff5f5; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #ff4757; position: relative; }
        .wrong-item .q { font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .wrong-item .ans-row { display: flex; justify-content: space-between; font-size: 14px; margin-top: 5px; }
        .wrong-item .my-a { color: #ff4757; }
        .wrong-item .correct-a { color: #2ed573; font-weight: bold; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; }
        .delete-btn:hover { color: #ff4757; }

        /* 游戏画布通用 */
        canvas { background: #fff; border-radius: 10px; display: block; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 100%; }
        
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .hidden { display: none !important; }

        /* 找不同特定样式 */
        .diff-wrapper { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .diff-canvas { border: 3px solid #dfe4ea; cursor: crosshair; touch-action: none; }
        .diff-info { text-align: center; font-size: 18px; color: #555; margin-bottom: 15px; }
        .diff-progress { font-weight: bold; color: #1e90ff; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 顶部导航栏 -->
    <div class="top-bar">
        <button class="nav-btn btn-home" onclick="showPage('menu')">🏠 返回主页</button>
        <div class="score-display">⭐ 积分: <span id="scoreDisplay">0</span></div>
        <button class="nav-btn btn-wrong" onclick="showWrongBook()">📕 错题库 (<span id="wrongCount">0</span>)</button>
    </div>

    <h1>🎓 二年级学习乐园</h1>

    <!-- 1. 主菜单 -->
    <div id="menu" class="page active">
        <div class="menu-grid">
            <div class="menu-card" onclick="startTest('chinese')">
                <h2>📖 语文挑战</h2>
                <p>看拼音写汉字 / 量词 / 古诗</p>
            </div>
            <div class="menu-card" onclick="startTest('math')">
                <h2>🔢 数学挑战</h2>
                <p>乘法口诀 / 加减法 / 单位换算</p>
            </div>
            <div class="menu-card" onclick="startGame('snake')">
                <h2>🐍 贪吃蛇</h2>
                <p>消耗20积分开启<br>锻炼反应能力</p>
            </div>
            <div class="menu-card" onclick="startGame('puzzle')">
                <h2>🧩 数字华容道</h2>
                <p>消耗20积分开启<br>锻炼逻辑思维</p>
            </div>
            <div class="menu-card" onclick="startGame('finddiff')">
                <h2>🔍 找不同</h2>
                <p>消耗10积分开启<br>找出3处不同赢大奖</p>
            </div>
        </div>
    </div>

    <!-- 2. 测试区 (填空题) -->
    <div id="testArea" class="page">
        <div class="game-area">
            <div class="timer-bar"><div id="timerFill" class="timer-fill"></div></div>
            <div class="question-box" id="questionText">题目加载中...</div>
            
            <div class="input-area">
                <input type="text" id="answerInput" class="answer-input" placeholder="在此输入答案" autocomplete="off">
                <button class="submit-btn" onclick="checkAnswer()">提交答案</button>
            </div>
            
            <div id="feedback" class="feedback"></div>
            <div class="text-center mt-20">
                <span id="progressText" style="color:#888;">进度: 0/0</span>
            </div>
        </div>
    </div>

    <!-- 3. 游戏区 -->
    <div id="gameArea" class="page">
        <div class="game-area text-center">
            <h2 id="gameTitle" style="color:#2f3542; margin-bottom:10px;">游戏进行中</h2>
            <p id="gameTip" style="color:#888; font-size:14px;"></p>
            
            <!-- 贪吃蛇/华容道画布 -->
            <canvas id="gameCanvas" width="400" height="400" class="hidden"></canvas>
            
            <!-- 找不同画布 -->
            <div id="diffGameContainer" class="hidden">
                <div class="diff-info">请点击 <strong>右侧图片</strong> 中不同的地方</div>
                <div class="diff-wrapper">
                    <canvas id="diffCanvasLeft" class="diff-canvas" width="300" height="300"></canvas>
                    <canvas id="diffCanvasRight" class="diff-canvas" width="300" height="300"></canvas>
                </div>
                <div class="diff-progress" id="diffProgressText">已找到: 0 / 3</div>
            </div>

            <div id="gameScoreBoard" style="font-size:20px; font-weight:bold; color:#ffa502; margin:10px 0;" class="hidden">得分: 0</div>
            <button class="submit-btn mt-20" onclick="stopGame()">结束游戏</button>
        </div>
    </div>

    <!-- 4. 错题库页 -->
    <div id="wrongArea" class="page">
        <div class="game-area">
            <h2 style="margin-bottom:20px; color:#ff4757; border-bottom:2px solid #eee; padding-bottom:10px;">📕 我的错题库</h2>
            <ul id="wrongList" class="wrong-list"></ul>
            <div id="emptyWrong" class="text-center mt-20" style="color:#888; padding:40px;">
                <div style="font-size:40px; margin-bottom:10px;">🎉</div>
                太棒了！暂无错题，继续保持！
            </div>
            <div class="text-center mt-20">
                <button class="submit-btn" onclick="showPage('menu')">返回主页</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== 全局状态 ====================
    const AppState = {
        score: parseInt(localStorage.getItem('study_score') || '0'),
        wrongBook: JSON.parse(localStorage.getItem('study_wrong') || '[]'),
        answeredHistory: JSON.parse(localStorage.getItem('study_history') || '{}'),
        currentTest: {
            type: '',
            questions: [],
            index: 0,
            timer: null,
            timeLeft: 0
        },
        game: {
            active: false,
            type: '',
            interval: null,
            ctx: null,
            canvas: null,
            // 找不同专用状态
            diffFound: [],
            diffTargets: []
        }
    };

    // ==================== 题库数据 ====================
    const QuestionBank = {
        chinese: [
            { q: "看拼音写汉字：chūn tiān", answers: ["春天"] },
            { q: "看拼音写汉字：dōng xuě", answers: ["冬雪"] },
            { q: "看拼音写汉字：fēi niǎo", answers: ["飞鸟"] },
            { q: "看拼音写汉字：huā duǒ", answers: ["花朵"] },
            { q: "看拼音写汉字：xuě huā", answers: ["雪花"] },
            { q: "看拼音写汉字：zuǒ yòu", answers: ["左右"] },
            { q: "看拼音写汉字：tài yáng", answers: ["太阳"] },
            { q: "看拼音写汉字：yuè liang", answers: ["月亮"] },
            { q: "看拼音写汉字：xīng xing", answers: ["星星"] },
            { q: "看拼音写汉字：yǔ wén", answers: ["语文"] },
            { q: "一（ ）书 (填量词)", answers: ["本"] },
            { q: "‘床前明月光’的下一句是？", answers: ["疑是地上霜"] },
            { q: "一（ ）牛 (填量词)", answers: ["头"] },
            { q: "‘白日依山尽’的下一句是？", answers: ["黄河入海流"] },
            { q: "一（ ）马 (填量词)", answers: ["匹"] },
            { q: "‘春眠不觉晓’的下一句是？", answers: ["处处闻啼鸟"] }
        ],
        math: [
            { q: "3 × 4 = ?", answers: ["12"] },
            { q: "5 × 6 = ?", answers: ["30"] },
            { q: "45 + 32 = ?", answers: ["77"] },
            { q: "1米 = ( )厘米", answers: ["100"] },
            { q: "角有几个顶点？", answers: ["1"] },
            { q: "7 × 8 = ?", answers: ["56"] },
            { q: "90 - 45 = ?", answers: ["45"] },
            { q: "课桌高约70( ) (填单位)", answers: ["厘米"] },
            { q: "直角是多少度？", answers: ["90"] },
            { q: "6 × 9 = ?", answers: ["54"] }
        ]
    };

    // ==================== 初始化与工具 ====================
    window.onload = function() {
        updateUI();
        document.getElementById('answerInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });
    };

    function updateUI() {
        document.getElementById('scoreDisplay').textContent = AppState.score;
        document.getElementById('wrongCount').textContent = AppState.wrongBook.length;
        localStorage.setItem('study_score', AppState.score);
        localStorage.setItem('study_wrong', JSON.stringify(AppState.wrongBook));
        localStorage.setItem('study_history', JSON.stringify(AppState.answeredHistory));
    }

    function showPage(pageId) {
        clearInterval(AppState.currentTest.timer);
        stopGameLogic();
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        
        let targetId = 'menu';
        if (pageId === 'test') targetId = 'testArea';
        else if (pageId === 'game') targetId = 'gameArea';
        else if (pageId === 'wrong') targetId = 'wrongArea';
        
        const targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.add('active');
        
        if (pageId === 'wrong') renderWrongBook();
        updateUI();
    }

    // ==================== 智能去重抽题 ====================
    function getUniqueQuestions(type, count) {
        const bank = QuestionBank[type];
        if (!AppState.answeredHistory[type]) AppState.answeredHistory[type] = [];
        
        let history = AppState.answeredHistory[type];
        let availableIndices = bank.map((_, i) => i).filter(i => !history.includes(i));
        
        if (availableIndices.length < count) {
            AppState.answeredHistory[type] = [];
            history = [];
            availableIndices = bank.map((_, i) => i);
        }
        
        availableIndices.sort(() => Math.random() - 0.5);
        const selectedIndices = availableIndices.slice(0, count);
        
        selectedIndices.forEach(idx => {
            if (!AppState.answeredHistory[type].includes(idx)) {
                AppState.answeredHistory[type].push(idx);
            }
        });
        
        return selectedIndices.map(idx => bank[idx]);
    }

    // ==================== 测试模块 ====================
    function startTest(type) {
        AppState.currentTest.type = type;
        AppState.currentTest.questions = getUniqueQuestions(type, 5);
        AppState.currentTest.index = 0;
        AppState.currentTest.timeLeft = 60;
        
        showPage('test');
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        const test = AppState.currentTest;
        if (test.index >= test.questions.length) {
            endTest();
            return;
        }
        
        const q = test.questions[test.index];
        document.getElementById('questionText').textContent = q.q;
        document.getElementById('progressText').textContent = `进度: ${test.index + 1} / ${test.questions.length}`;
        
        const input = document.getElementById('answerInput');
        input.value = '';
        input.disabled = false;
        input.focus();
        
        const feedback = document.getElementById('feedback');
        feedback.textContent = '';
        feedback.className = 'feedback';
    }

    function checkAnswer() {
        const test = AppState.currentTest;
        if (test.index >= test.questions.length) return;
        
        const input = document.getElementById('answerInput');
        const userVal = input.value.trim();
        
        if (!userVal) {
            alert("请输入答案哦！");
            return;
        }
        
        input.disabled = true;
        const q = test.questions[test.index];
        const isCorrect = q.answers.some(ans => ans.toLowerCase() === userVal.toLowerCase());
        
        const feedback = document.getElementById('feedback');
        
        if (isCorrect) {
            feedback.textContent = '✅ 回答正确！+1分';
            feedback.classList.add('correct');
            AppState.score += 1;
        } else {
            feedback.textContent = `❌ 回答错误。正确答案是: ${q.answers[0]}`;
            feedback.classList.add('wrong');
            addToWrongBook(q, userVal);
        }
        
        updateUI();
        
        setTimeout(() => {
            AppState.currentTest.index++;
            renderQuestion();
        }, 1500);
    }

    function startTimer() {
        const fill = document.getElementById('timerFill');
        clearInterval(AppState.currentTest.timer);
        
        AppState.currentTest.timer = setInterval(() => {
            AppState.currentTest.timeLeft--;
            const pct = (AppState.currentTest.timeLeft / 60) * 100;
            fill.style.width = `${pct}%`;
            
            if (AppState.currentTest.timeLeft <= 0) {
                endTest();
            }
        }, 1000);
    }

    function endTest() {
        clearInterval(AppState.currentTest.timer);
        alert(`测试完成！\n当前总积分: ${AppState.score}`);
        showPage('menu');
    }

    // ==================== 错题库模块 ====================
    function addToWrongBook(q, myAns) {
        const exists = AppState.wrongBook.some(item => item.q === q.q && item.myAns === myAns);
        if (exists) return;
        
        AppState.wrongBook.unshift({
            q: q.q,
            correct: q.answers[0],
            myAns: myAns,
            date: new Date().toLocaleDateString()
        });
        
        if (AppState.wrongBook.length > 50) AppState.wrongBook.pop();
        updateUI();
    }

    function showWrongBook() {
        showPage('wrong');
    }

    function renderWrongBook() {
        const list = document.getElementById('wrongList');
        const empty = document.getElementById('emptyWrong');
        list.innerHTML = '';
        
        if (AppState.wrongBook.length === 0) {
            empty.style.display = 'block';
            return;
        }
        
        empty.style.display = 'none';
        AppState.wrongBook.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'wrong-item';
            li.innerHTML = `
                <button class="delete-btn" onclick="removeWrong(${index})">×</button>
                <div class="q">${item.q}</div>
                <div class="ans-row">
                    <span class="my-a">❌ 你的答案: ${item.myAns}</span>
                    <span class="correct-a">✅ 正确答案: ${item.correct}</span>
                </div>
                <div style="font-size:12px; color:#aaa; margin-top:5px; text-align:right;">${item.date}</div>
            `;
            list.appendChild(li);
        });
    }

    function removeWrong(index) {
        AppState.wrongBook.splice(index, 1);
        updateUI();
        renderWrongBook();
    }

    // ==================== 游戏模块 ====================
    function startGame(type) {
        const cost = (type === 'snake' || type === 'puzzle') ? 20 : 10;
        if (AppState.score < cost) {
            alert(`积分不足！需要 ${cost} 积分才能玩这个游戏。\n快去刷题赚取积分吧！`);
            return;
        }
        
        AppState.score -= cost;
        updateUI();
        
        showPage('game');
        AppState.game.type = type;
        AppState.game.active = true;
        
        // 隐藏所有游戏容器
        document.getElementById('gameCanvas').classList.add('hidden');
        document.getElementById('diffGameContainer').classList.add('hidden');
        document.getElementById('gameScoreBoard').classList.add('hidden');
        
        if (type === 'finddiff') {
            initFindDiffGame();
        } else {
            document.getElementById('gameCanvas').classList.remove('hidden');
            document.getElementById('gameScoreBoard').classList.remove('hidden');
            
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            AppState.game.ctx = ctx;
            AppState.game.canvas = canvas;
            
            if (type === 'snake') initSnakeGame();
            else if (type === 'puzzle') initPuzzleGame();
        }
    }

    function stopGame() {
        stopGameLogic();
        showPage('menu');
    }

    function stopGameLogic() {
        AppState.game.active = false;
        if (AppState.game.interval) clearInterval(AppState.game.interval);
        
        if (document.onkeydown) document.onkeydown = null;
        
        const canvas = document.getElementById('gameCanvas');
        if (canvas) canvas.onclick = null;
        
        const diffCanvas = document.getElementById('diffCanvasRight');
        if (diffCanvas) diffCanvas.onclick = null;
    }

    // --- 找不同游戏逻辑 ---
    function initFindDiffGame() {
        document.getElementById('gameTitle').textContent = '🔍 火眼金睛找不同';
        document.getElementById('gameTip').textContent = '左右两图有3处不同，点击右图的不同之处';
        document.getElementById('diffGameContainer').classList.remove('hidden');
        
        const leftCvs = document.getElementById('diffCanvasLeft');
        const rightCvs = document.getElementById('diffCanvasRight');
        const leftCtx = leftCvs.getContext('2d');
        const rightCtx = rightCvs.getContext('2d');
        
        // 生成随机差异点 (3个)
        const targets = [];
        while(targets.length < 3) {
            const x = Math.floor(Math.random() * 260) + 20;
            const y = Math.floor(Math.random() * 260) + 20;
            // 简单去重
            let tooClose = false;
            for(let t of targets) {
                if (Math.abs(t.x - x) < 40 && Math.abs(t.y - y) < 40) tooClose = true;
            }
            if (!tooClose) targets.push({x, y, found: false});
        }
        AppState.game.diffTargets = targets;
        AppState.game.diffFound = [];
        
        updateDiffProgress();
        
        // 绘制基础场景函数
        function drawScene(ctx, isRight) {
            // 背景
            ctx.fillStyle = '#87CEEB'; // 天空蓝
            ctx.fillRect(0, 0, 300, 300);
            
            // 草地
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, 200, 300, 100);
            
            // 太阳 (左上)
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(50, 50, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // 房子 (中间)
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(100, 120, 100, 80); // 房体
            ctx.beginPath(); // 屋顶
            ctx.moveTo(90, 120);
            ctx.lineTo(150, 60);
            ctx.lineTo(210, 120);
            ctx.fillStyle = '#8B4513';
            ctx.fill();
            
            // 门
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(135, 160, 30, 40);
            
            // 树 (右边)
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(240, 150, 20, 50); // 树干
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.arc(250, 130, 40, 0, Math.PI * 2); // 树冠
            ctx.fill();
            
            // 云朵 (右上)
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(220, 40, 20, 0, Math.PI * 2);
            ctx.arc(240, 50, 25, 0, Math.PI * 2);
            ctx.arc(260, 40, 20, 0, Math.PI * 2);
            ctx.fill();

            // --- 应用差异 ---
            if (isRight) {
                // 差异1: 太阳颜色变红
                ctx.fillStyle = '#FF4500'; 
                ctx.beginPath();
                ctx.arc(50, 50, 30, 0, Math.PI * 2);
                ctx.fill();
                
                // 差异2: 房子门变成圆形
                ctx.fillStyle = '#FF6B6B'; // 覆盖原来的矩形门
                ctx.fillRect(135, 160, 30, 40);
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(150, 180, 15, 0, Math.PI * 2);
                ctx.fill();

                // 差异3: 树冠变小
                ctx.fillStyle = '#90EE90'; // 覆盖原来的大树冠
                ctx.beginPath();
                ctx.arc(250, 130, 40, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.arc(250, 130, 25, 0, Math.PI * 2); // 小树冠
                ctx.fill();
            }
        }
        
        drawScene(leftCtx, false);
        drawScene(rightCtx, true);
        
        // 绑定点击事件
        rightCvs.onclick = function(e) {
            if (!AppState.game.active) return;
            
            const rect = rightCvs.getBoundingClientRect();
            // 考虑缩放
            const scaleX = rightCvs.width / rect.width;
            const scaleY = rightCvs.height / rect.height;
            
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;
            
            let hit = false;
            AppState.game.diffTargets.forEach((t, idx) => {
                if (t.found) return;
                const dist = Math.sqrt((clickX - t.x)**2 + (clickY - t.y)**2);
                if (dist < 30) {
                    t.found = true;
                    AppState.game.diffFound.push(t);
                    hit = true;
                    
                    // 画圈标记
                    rightCtx.strokeStyle = '#FF0000';
                    rightCtx.lineWidth = 3;
                    rightCtx.beginPath();
                    rightCtx.arc(t.x, t.y, 25, 0, Math.PI * 2);
                    rightCtx.stroke();
                    
                    // 左图也标记
                    leftCtx.strokeStyle = '#FF0000';
                    leftCtx.lineWidth = 3;
                    leftCtx.beginPath();
                    leftCtx.arc(t.x, t.y, 25, 0, Math.PI * 2);
                    leftCtx.stroke();
                }
            });
            
            if (hit) {
                updateDiffProgress();
                if (AppState.game.diffFound.length === 3) {
                    setTimeout(() => {
                        alert("🎉 太厉害了！全部找出来了！\n奖励积分: 50分");
                        AppState.score += 50;
                        updateUI();
                        stopGame();
                    }, 500);
                }
            }
        };
    }
    
    function updateDiffProgress() {
        const count = AppState.game.diffFound.length;
        document.getElementById('diffProgressText').textContent = `已找到: ${count} / 3`;
    }

    // --- 贪吃蛇逻辑 ---
    function initSnakeGame() {
        document.getElementById('gameTitle').textContent = '🐍 贪吃蛇大作战';
        document.getElementById('gameTip').textContent = '使用方向键控制移动，吃到红色方块得分';
        
        const ctx = AppState.game.ctx;
        const cvs = AppState.game.canvas;
        if (!ctx || !cvs) return;

        const gridSize = 20;
        const tileCount = cvs.width / gridSize;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        
        document.getElementById('gameScoreBoard').textContent = '得分: 0';
        
        document.onkeydown = function(e) {
            if (!AppState.game.active) return;
            switch(e.key) {
                case 'ArrowUp': if(dy !== 1) { dx=0; dy=-1; } break;
                case 'ArrowDown': if(dy !== -1) { dx=0; dy=1; } break;
                case 'ArrowLeft': if(dx !== 1) { dx=-1; dy=0; } break;
                case 'ArrowRight': if(dx !== -1) { dx=1; dy=0; } break;
            }
        };
        
        AppState.game.interval = setInterval(() => {
            if (!AppState.game.active) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver(score);
                return;
            }
            for (let i=0; i<snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver(score);
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('gameScoreBoard').textContent = '得分: ' + score;
                AppState.score += 5;
                updateUI();
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }
            
            ctx.fillStyle = '#2f3542';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            ctx.fillStyle = '#ff4757';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-2, gridSize-2);
            
            ctx.fillStyle = '#7bed9f';
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize-2, gridSize-2);
            });
            
        }, 150);
        
        function gameOver(finalScore) {
            stopGameLogic();
            alert(`游戏结束！\n本局得分: ${finalScore}\n获得奖励积分: ${Math.floor(finalScore/2)}`);
            AppState.score += Math.floor(finalScore/2);
            updateUI();
            showPage('menu');
        }
    }

    // --- 数字华容道逻辑 ---
    function initPuzzleGame() {
        document.getElementById('gameTitle').textContent = '🧩 数字华容道';
        document.getElementById('gameTip').textContent = '点击数字块，将其移动到空白处，按顺序排列1-8';
        
        const ctx = AppState.game.ctx;
        const cvs = AppState.game.canvas;
        if (!ctx || !cvs) return;

        const size = 130; 
        const gap = 5;
        
        let tiles = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        for(let i=0; i<100; i++) {
            let emptyIdx = tiles.indexOf(0);
            let possibleMoves = [];
            if (emptyIdx % 3 !== 0) possibleMoves.push(emptyIdx - 1);
            if (emptyIdx % 3 !== 2) possibleMoves.push(emptyIdx + 1);
            if (emptyIdx >= 3) possibleMoves.push(emptyIdx - 3);
            if (emptyIdx < 6) possibleMoves.push(emptyIdx + 3);
            
            let move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            [tiles[emptyIdx], tiles[move]] = [tiles[move], tiles[emptyIdx]];
        }
        
        let moves = 0;
        document.getElementById('gameScoreBoard').textContent = '步数: 0';
        
        function drawPuzzle() {
            if (!AppState.game.active) return;
            ctx.fillStyle = '#2f3542';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            for(let i=0; i<9; i++) {
                let val = tiles[i];
                if (val === 0) continue;
                
                let x = (i % 3) * size + gap;
                let y = Math.floor(i / 3) * size + gap;
                
                ctx.fillStyle = '#1e90ff';
                ctx.fillRect(x, y, size - gap*2, size - gap*2);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(val, x + (size-gap*2)/2, y + (size-gap*2)/2);
            }
        }
        
        if (cvs) {
            cvs.onclick = function(e) {
                if (!AppState.game.active) return;
                
                const rect = cvs.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                
                const col = Math.floor(clickX / size);
                const row = Math.floor(clickY / size);
                
                if (col < 0 || col > 2 || row < 0 || row > 2) return;
                
                const clickedIdx = row * 3 + col;
                const emptyIdx = tiles.indexOf(0);
                
                let isAdjacent = false;
                if (Math.abs(clickedIdx - emptyIdx) === 1 && Math.floor(clickedIdx/3) === Math.floor(emptyIdx/3)) isAdjacent = true;
                if (Math.abs(clickedIdx - emptyIdx) === 3) isAdjacent = true;
                
                if (isAdjacent) {
                    [tiles[clickedIdx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[clickedIdx]];
                    moves++;
                    document.getElementById('gameScoreBoard').textContent = '步数: ' + moves;
                    drawPuzzle();
                    checkWin();
                }
            };
        }
        
        function checkWin() {
            const winState = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            if (JSON.stringify(tiles) === JSON.stringify(winState)) {
                setTimeout(() => {
                    alert(`恭喜通关！\n用了 ${moves} 步\n奖励积分 50!`);
                    AppState.score += 50;
                    updateUI();
                    stopGame();
                }, 100);
            }
        }
        
        drawPuzzle();
    }
</script>
